<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — TSSR Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      color: var(--primary);
      opacity: 0.15;
      font-family: 'JetBrains Mono', monospace;
      user-select: none;
    }
    .error-icon {
      font-size: 3.5rem;
      margin-top: -4rem;
    }
    .error-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .error-desc {
      color: var(--text-secondary);
      max-width: 420px;
      line-height: 1.6;
      margin: 0;
    }
    .error-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }
    .error-actions .btn {
      min-width: 140px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Navigation principale">
    <div class="navbar__container">
      <a href="index.html" class="navbar__logo" aria-label="TSSR Notes — Accueil">
        <div class="navbar__logo-icon" aria-hidden="true">T</div>
        <span class="navbar__logo-text">TSSR<strong>Notes</strong></span>
      </a>
      <div class="navbar__nav" role="list">
        <a href="pages/cours.html"      class="navbar__link" role="listitem">Cours</a>
        <a href="pages/quiz.html"       class="navbar__link" role="listitem">Quiz</a>
        <a href="pages/checklist.html"  class="navbar__link" role="listitem">Checklist</a>
        <a href="pages/tableau.html"    class="navbar__link" role="listitem">Tableaux</a>
        <a href="pages/glossaire.html"  class="navbar__link" role="listitem">Glossaire</a>
        <a href="pages/ressources.html" class="navbar__link" role="listitem">Ressources</a>
      </div>
      <div class="navbar__actions">
        <div class="navbar__auth-slot"></div>
      </div>
    </div>
  </nav>

  <!-- Contenu 404 -->
  <main class="error-page">
    <div class="error-code" aria-hidden="true">404</div>
    <div class="error-icon" aria-hidden="true">🔍</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-desc">
      La page que tu cherches n'existe pas ou a été déplacée.
      Retourne à l'accueil pour continuer à réviser&nbsp;!
    </p>
    <div class="error-actions">
      <a href="index.html" class="btn btn--primary">Accueil</a>
      <a href="pages/cours.html" class="btn btn--secondary">Fiches de cours</a>
    </div>
  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>
